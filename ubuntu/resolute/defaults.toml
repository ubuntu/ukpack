# SPDX-License-Identifier: GPL-2.0-only

arch = "amd64"
config = "defconfig"
head = "HEAD"
vdso-install = "vdso_install"
install-mod-strip = "1"

[amd64]
tools = "usbip acpidbg rtla cpupower perf bpftool x86"
[arm64]
tools = "usbip rtla cpupower perf bpftool"
[armhf]
tools = "usbip rtla cpupower perf bpftool"
[i386]
tools = "usbip acpidbg rtla cpupower perf bpftool x86"
[ppc64el]
tools = "usbip rtla cpupower perf bpftool"
vdso-install = ""
[riscv64]
tools = "usbip rtla cpupower perf bpftool"
install-mod-strip = "--strip-debug --discard-locals"
[s390x]
tools = "usbip rtla cpupower perf bpftool"
[x32]
tools = "usbip rtla cpupower perf bpftool x86"

[pkg.source]
Section = "devel"
Priority = "optional"
Rules-Requires-Root = "no"
Standards-Version = "4.6.2"
Build-Depends = [
  "debhelper-compat (= 13)",
  "dpkg-build-api (= 1)",
]

[pkg.meta]
Package = "linux-{{FLAVOUR}}"
Build-Profiles = "<!cross>"
Section = "kernel"
Depends = [
  "${misc:Depends}",
  "linux-image-{{FLAVOUR}} (= ${binary:Version})",
  "linux-headers-{{FLAVOUR}} (= ${binary:Version})",
]
Recommends = [
  "linux-tools-{{FLAVOUR}}",
  "ubuntu-kernel-accessories",
]
Description = """
Complete Linux {{FLAVOUR}} kernel and headers
This package will always depend on the latest complete
Linux {{FLAVOUR}} kernel and headers.
"""

[pkg.meta-image]
Package = "linux-image-{{FLAVOUR}}"
Section = "kernel"
Depends = [
  "${misc:Depends}",
  "linux-image-{{KREL}}",
  "linux-modules-{{KREL}}",
  "linux-firmware",
]
Description = """
Linux {{FLAVOUR}} kernel image
This package will always depend on the latest {{FLAVOUR}} kernel packages.
"""

[pkg.meta-headers]
Package = "linux-headers-{{FLAVOUR}}"
Build-Profiles = "<!cross>"
Section = "kernel"
Depends = [
  "${misc:Depends}",
  "linux-headers-{{KREL}}",
]
Description = """
Linux {{FLAVOUR}} kernel headers
This package will always depend on the latest {{FLAVOUR}} kernel headers
available.
"""

[pkg.meta-tools]
Package = "linux-tools-{{FLAVOUR}}"
Build-Profiles = "<!cross>"
Section = "kernel"
Provides = [
  "linux-tools"
]
Depends = [
  "${misc:Depends}",
  "linux-tools-{{KREL}}",
]
Description = """
Linux {{FLAVOUR}} kernel tools
This package will always depend on the latest {{FLAVOUR}} kernel tools
available.
"""

[pkg.image]
Package = "linux-image-{{KREL}}"
Section = "kernel"
Priority = "optional"
Provides = [
  "linux-image",
  "${misc:Provides}",
]
Depends = [
  "${misc:Depends}",
  "kmod",
  "linux-modules-{{KREL}}",
]
Build-Depends-Arch = [
  "gcc-i686-linux-gnu [i386] <cross>",
  "gcc-x86-64-linux-gnux32 [x32] <cross>",
  "gcc-x86-64-linux-gnu [amd64] <cross>",
  "gcc-arm-linux-gnueabihf [armhf] <cross>",
  "gcc-aarch64-linux-gnu [arm64] <cross>",
  "gcc-powerpc-linux-gnu [powerpc] <cross>",
  "gcc-powerpc64le-linux-gnu [ppc64el] <cross>",
  "gcc-riscv64-linux-gnu [riscv64] <cross>",
  "gcc-s390x-linux-gnu [s390x] <cross>",
  "libc6-dev-i386-cross [i386] <cross>",
  "libc6-dev-x32-cross [x32] <cross>",
  "libc6-dev-amd64-cross [amd64] <cross>",
  "libc6-dev-armhf-cross [armhf] <cross>",
  "libc6-dev-arm64-cross [arm64] <cross>",
  "libc6-dev-powerpc-cross [powerpc] <cross>",
  "libc6-dev-ppc64el-cross [ppc64el] <cross>",
  "libc6-dev-riscv64-cross [riscv64] <cross>",
  "libc6-dev-s390x-cross [s390x] <cross>",
  "libelf-dev:native",
  "libssl-dev:native",
  "flex",
  "bison",
  "gawk",
  "bc",
  "cpio",
  "python3:native",
  "perl:native",
  "rustc:native",
  "rust-src:native",
  "bindgen:native",
  "pahole",
]
Recommends = [
  """grub-pc [amd64] | \
     grub-efi-amd64 [amd64] | \
     grub-efi-ia32 [amd64] | \
     grub [amd64] | \
     lilo [amd64] | \
     flash-kernel [armhf arm64] | \
     grub-efi-arm64 [arm64] | \
     grub-efi-arm [armhf] | \
     grub-ieee1275 [ppc64el]\
  """,
  "initramfs-tools",
]
Suggests = [
  #"fdutils",
  "linux-tools-{{KREL}}",
  "linux-headers-{{KREL}}",
]
Description = """
Linux {{FLAVOUR}} kernel image version {{KVER}}
This package contains the Linux {{FLAVOUR}} kernel image version {{KVER}}.

You likely do not want to install this package directly. Instead, install
the linux-{{FLAVOUR}} meta-package, which will ensure that upgrades work
correctly, and that supporting packages are also installed.
"""

[pkg.modules]
Package = "linux-modules-{{KREL}}"
Section = "kernel"
Priority = "optional"
Provides = [
  "${misc:Provides}"
]
Depends = [
  "${misc:Depends}"
]
Build-Depends-Arch = [
  "kmod",
  "zstd",
]
Description = """
Linux {{FLAVOUR}} kernel modules for version {{KVER}}
Contains the corresponding System.map file, the modules built by the
packager, and scripts that try to ensure that the system is not left in an
unbootable state after an update.

You likely do not want to install this package directly. Instead, install
the linux-{{FLAVOUR}} meta-package, which will ensure that upgrades work
correctly, and that supporting packages are also installed.
"""

[pkg.headers]
Package = "linux-headers-{{KREL}}"
Build-Profiles = "<!cross>"
Section = "devel"
Priority = "optional"
Depends = [
  "${misc:Depends}",
]
Provides = [
  "linux-headers",
  "linux-headers-3.0",
]
Description = """
Linux {{FLAVOUR}} kernel headers for version {{KVER}}
This package provides kernel header files for version {{KREL}}.

This is for sites that want the latest kernel headers.  Please read
/usr/share/doc/linux-headers-{{KREL}}/debian.README.gz for details.
"""

[pkg.tools]
Package = "linux-tools-{{KREL}}"
Build-Profiles = "<!cross>"
Section = "devel"
Priority = "optional"
Depends = [
  "${misc:Depends}",
  "${shlibs:Depends}",
  "libc6 (>= 2.38)",
  "libudev1 (>= 183)",
  "linux-tools-common",
]
Build-Depends-Arch = [
  "default-jdk-headless <!cross>",
  "libcap-dev <!cross>",
  "libdw-dev <!cross>",
  "libnuma-dev <!cross>",
  "libpci-dev <!cross>",
  "libslang2-dev <!cross>",
  "libstdc++-dev <!cross>",
  "libtraceevent-dev <!cross>",
  "libtracefs-dev <!cross>",
  "libudev-dev <!cross>",
  "libunwind-dev <!cross>",
  "uuid-dev <!cross>",
  "pkg-config <!cross>",
  "python3-dev <!cross>",
  "python3-setuptools <!cross>",
]
Description = """
Linux {{FLAVOUR}} tools for version {{KVER}}
This package provides the architecture dependant parts for kernel
version locked tools (such as perf and x86_energy_perf_policy) for
version {{KREL}}.
"""

[pkg.lmm-zfs]
Package = "linux-main-modules-zfs-{{KREL}}"
Section = "kernel"
Priority = "optional"
Depends = [
  "kmod",
]
Provides = [
  "spl-modules",
  "zfs-modules",
]
Build-Depends-Arch = [
  "zfs-dkms",
]
Description = """
Out-of-tree zfs modules for {{KVER}}
This package contains the zfs modules for version {{KVER}}.

You likely do not want to install this package directly, Instead, install
the linux-image-{{FLAVOUR}} meta-package, which will ensure that
upgrades work correctly, and that supporting packages are also installed.
"""

